name: Update MAG7 Stock Data

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas

      - name: Run MAG7 fetcher
        run: python mag7_fetch.py

      - name: Generate data index
        run: |
          python - <<'EOF'
          import os, json, re
          data_dir = "data"
          files = sorted([
            f for f in os.listdir(data_dir)
            if re.match(r"magnificent7_\d{8}\.json", f)
          ], reverse=True)
          dates = [re.search(r"(\d{8})", f).group(1) for f in files]
          with open(os.path.join(data_dir, "index.json"), "w") as fp:
            json.dump({"dates": dates, "latest": dates[0] if dates else None}, fp)
          print(f"index.json generado con {len(dates)} fechas: {dates}")
          EOF

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "data: update $(date +'%Y-%m-%d')"
          git push
